name: CI

on:
  pull_request:
    branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: setup node
              uses: actions/setup-node@v4
              with:
                node-version: '22'
                cache: node
            - name: Install deps
              run: npm ci
            - name: run tests
              run: node --test
            - name: Lint
              run: npx eslint .